name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and validate static output
        run: |
          npm run build
          node scripts/check-i18n-parity.mjs
          node scripts/check-links.mjs
          npx html-validate "dist/**/*.html"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run interaction smoke tests
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          mkdir -p /tmp/fluttera-shots
          npm run preview -- --host 127.0.0.1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4321/ >/dev/null && break
            sleep 1
          done
          node scripts/interaction-test.mjs /tmp/fluttera-shots http://127.0.0.1:4321

      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

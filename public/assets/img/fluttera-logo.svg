<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 250" role="img" aria-labelledby="title desc">
  <title id="title">Fluttera logo</title>
  <desc id="desc">Silver Fluttera mark and wordmark with gold Build Scale Elevate tagline.</desc>

  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.38" stop-color="#E8EAF0"/>
      <stop offset="0.68" stop-color="#B8BDC8"/>
      <stop offset="1" stop-color="#F7F8FB"/>
    </linearGradient>
  </defs>

  <!-- Symbol -->
  <g transform="translate(34 28)" fill="url(#silver)">
    <path d="M24 43 C24 20 42 4 65 4 H164 L139 29 C126 42 111 49 92 49 H24 Z"/>
    <path d="M38 72 C38 58 49 47 63 47 H138 L116 69 C104 81 92 86 76 86 H38 Z"/>
    <path d="M38 108 C38 96 47 87 59 87 H103 L83 112 C70 128 57 142 38 151 Z"/>
  </g>

  <!-- Wordmark -->
  <text x="245" y="126"
        fill="url(#silver)"
        font-family="Arial, Helvetica, sans-serif"
        font-size="92"
        font-weight="300"
        letter-spacing="9">Fluttera</text>

  <!-- Tagline -->
  <text x="250" y="184"
        fill="#D4AF37"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="11">BUILD • SCALE • ELEVATE</text>
</svg>
